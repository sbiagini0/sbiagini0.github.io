<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Initial Hero Animations
    const heroTimeline = gsap.timeline({ defaults: { ease: "power4.out", duration: 1.2 } });
    
    const profile = document.querySelector('.profile');
    if (profile) {
      heroTimeline
        .fromTo('.profile .avatar', 
          { scale: 0.5, opacity: 0, rotate: -5 },
          { scale: 1, opacity: 1, rotate: 0, duration: 1.5, ease: "elastic.out(1, 0.75)" }
        )
        .fromTo('.profile h1', 
          { y: 30, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.8 }, 
          "-=1"
        )
        .fromTo('.profile .subtitle', 
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.8 }, 
          "-=0.6"
        )
        .fromTo('.social-icons a', 
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, stagger: 0.1, duration: 0.6, ease: "back.out(1.7)" }, 
          "-=0.4"
        );

      // Subtle float animation
      gsap.to('.profile .avatar img', {
        y: 8,
        duration: 3,
        ease: "sine.inOut",
        repeat: -1,
        yoyo: true,
        delay: 2
      });
    }

    // 2. Reading Progress Bar 
    const progressBar = document.querySelector('.reading-progress-bar');
    if (progressBar) {
      window.addEventListener('scroll', () => {
        const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = (window.scrollY / totalHeight) * 100;
        progressBar.style.width = `${progress}%`;
      });
    }

    // 3. ScrollReveal (same motion as Posts): lists, Apps cards, About/post singles, Search chrome
    // Home hero (.profile) stays on its own timeline above.
    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
      gsap.registerPlugin(ScrollTrigger);

      const revealFromBelow = (elements, staggerDuplex = true) => {
        elements.forEach((el, index) => {
          gsap.from(el, {
            scrollTrigger: {
              trigger: el,
              start: 'top 92%',
              toggleActions: 'play none none none'
            },
            y: 40,
            opacity: 0,
            duration: 0.8,
            ease: 'power2.out',
            delay: staggerDuplex ? (index % 2) * 0.1 : 0
          });
        });
      };

      const listCards = document.querySelectorAll('.post-entry, .first-entry, .apps-card');
      revealFromBelow(listCards, true);

      listCards.forEach((entry) => {
        const swiperImg = entry.querySelector('.post-item-swiper img');
        if (swiperImg) {
          entry.addEventListener('mouseenter', () => {
            gsap.to(swiperImg, { scale: 1.05, duration: 0.6, ease: 'power2.out' });
          });
          entry.addEventListener('mouseleave', () => {
            gsap.to(swiperImg, { scale: 1, duration: 0.6, ease: 'power2.out' });
          });
        }
      });

      revealFromBelow(document.querySelectorAll('article.post-single'), false);
      revealFromBelow(document.querySelectorAll('.main > header.page-header'), false);
      revealFromBelow(document.querySelectorAll('.main .searchbox'), false);
    }

    // 4. Header interaction
    window.addEventListener('scroll', () => {
      const header = document.querySelector('.header');
      if (header) {
        if (window.scrollY > 40) {
          header.classList.add('header-scrolled');
        } else {
          header.classList.remove('header-scrolled');
        }
      }
    });

    // 5. Individual Post Carousels
    if (typeof Swiper !== 'undefined') {
      const itemSwipers = document.querySelectorAll('.post-item-swiper');
      itemSwipers.forEach((swiperEl, index) => {
        new Swiper(swiperEl, {
          slidesPerView: 1,
          spaceBetween: 0,
          loop: true,
          observer: true,       // CRITICAL: Watch for visibility changes
          observeParents: true, // Watch for parent container changes
          effect: 'fade',
          fadeEffect: { crossFade: true },
          autoplay: {
            delay: 3500 + (index * 400),
            disableOnInteraction: false,
          },
          speed: 1200,
        });
      });
    }
  });
</script>
